<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Record For You</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,400&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--ink:#100b1b;--night:#1a1230;--plum:#2a1a3a;--wine:#4d2342;--ember:#e7a85e;--rose:#dd8aa2;--mist:#9d8fb6;--cream:#f8efe0}
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{background:var(--ink);color:var(--cream);font-family:'Lora',Georgia,serif;-webkit-font-smoothing:antialiased}
.sky{position:fixed;inset:0;z-index:0;background:linear-gradient(180deg,var(--ink) 0%,var(--night) 34%,var(--plum) 66%,var(--wine) 100%)}
.beam{position:fixed;left:50%;bottom:-12vh;z-index:0;transform:translateX(-50%);width:130vmax;height:130vmax;pointer-events:none;mix-blend-mode:screen;filter:blur(6px);transition:background .1s linear}
.vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(120% 100% at 50% 40%,rgba(0,0,0,0) 52%,rgba(8,5,14,.65) 100%)}
.stage{position:fixed;inset:0;z-index:3;display:flex;flex-direction:column;align-items:center;padding:clamp(8px,2vh,20px) 12px;gap:8px}
.album-title{font-family:'Poppins',sans-serif;font-weight:600;letter-spacing:.5em;text-transform:uppercase;font-size:10px;color:var(--ember);text-align:center;opacity:.7}
.track-nav{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;width:100%;max-width:900px}
.track-btn{background:transparent;padding:5px 10px;border-radius:20px;font-size:10px;letter-spacing:.06em;color:var(--mist);cursor:pointer;border:1px solid rgba(246,212,154,.2);transition:.25s;font-weight:500;font-family:'Poppins',sans-serif}
.track-btn.active{color:var(--cream);background:rgba(231,168,94,.25);border-color:var(--ember);box-shadow:0 0 12px rgba(231,168,94,.3)}
.lyrics-wrap{flex:1;width:100%;max-width:900px;position:relative;overflow:hidden;-webkit-mask-image:linear-gradient(180deg,transparent 0%,#000 18%,#000 82%,transparent 100%);mask-image:linear-gradient(180deg,transparent 0%,#000 18%,#000 82%,transparent 100%)}
.lyrics-inner{position:absolute;left:0;right:0;top:50%;transition:transform .6s cubic-bezier(.22,.61,.18,1)}
.line{font-size:clamp(1.2rem,3.8vw,2.4rem);font-weight:500;line-height:1.6;text-align:center;color:var(--mist);opacity:.28;padding:.12em 8%;margin:.3em 0;transition:opacity .5s,color .5s,text-shadow .5s,transform .5s;transform:scale(.96)}
.line.near{opacity:.45;transform:scale(.985)}
.line.active{color:var(--cream);opacity:1;transform:scale(1.08);text-shadow:0 0 30px rgba(246,212,154,.62),0 0 70px rgba(231,168,94,.32)}
.line.section-label{font-family:'Poppins',sans-serif;font-weight:600;letter-spacing:.32em;text-transform:uppercase;font-size:.5rem;color:var(--rose);opacity:0;padding:.06em 0 .7em;transform:none;margin:0;transition:opacity .5s}
.line.section-label.show{opacity:.5}
.intro{position:absolute;inset:0;z-index:4;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:6px;transition:opacity .9s,transform .9s;padding:20px}
.intro.hidden{opacity:0;transform:translateY(-12px);pointer-events:none}
.kicker{font-family:'Poppins',sans-serif;letter-spacing:.5em;text-transform:uppercase;font-size:9px;color:var(--rose);margin-bottom:4px}
.intro h1{font-size:clamp(1.8rem,5.5vw,4rem);font-weight:600;line-height:1.05;color:var(--cream);text-shadow:0 0 50px rgba(231,168,94,.25)}
.intro .by{font-style:italic;color:var(--ember);font-size:clamp(.8rem,2vw,1rem)}
.cue{margin-top:12px;font-family:'Poppins',sans-serif;font-size:10px;letter-spacing:.15em;color:var(--mist);text-transform:uppercase;animation:breathe 3.4s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.4}50%{opacity:.95}}
.controls{flex:none;width:100%;max-width:700px;display:flex;align-items:center;gap:12px}
.play-btn{flex:none;width:48px;height:48px;border-radius:50%;border:1px solid rgba(246,212,154,.4);background:radial-gradient(circle at 50% 38%,rgba(246,212,154,.2),rgba(74,36,66,.55));color:var(--cream);cursor:pointer;display:grid;place-items:center;transition:transform .15s,border-color .25s;font-size:0}
.play-btn:hover{transform:scale(1.05);border-color:var(--ember)}
.play-btn svg{width:18px;height:18px;fill:var(--cream)}
.info{flex:1;display:flex;flex-direction:column;gap:4px}
.row1{display:flex;justify-content:space-between;align-items:baseline}
.sect-lbl{font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--ember);font-weight:500;font-family:'Poppins',sans-serif}
.time-lbl{font-size:9px;letter-spacing:.08em;color:var(--mist);font-family:'Poppins',sans-serif}
.bar{position:relative;height:3px;border-radius:3px;background:rgba(255,255,255,.08);cursor:pointer;overflow:hidden}
.fill{position:absolute;inset:0 auto 0 0;border-radius:3px;background:linear-gradient(90deg,rgba(221,138,162,.9),rgba(246,212,154,.95));box-shadow:0 0 12px rgba(231,168,94,.5);transition:width .1s linear}
.hint{font-family:'Poppins',sans-serif;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--mist);opacity:.3;text-align:center}
</style>
</head>

const { useState, useEffect, useRef, useCallback } = React;

e": "Moonlight", "kicker": "A Love Song", "file": "track2.mp3", "lyrics": [{"sec": "Verse 1", "t": 16, "text": "In the quiet hours when the world fades out,"}, {"sec": "Verse 1", "t": 24, "text": "I find myself reaching through the dark and doubt,"}, {"sec": "Verse 1", "t": 32, "text": "Your voice is soft but it steadies me,"}, {"sec": "Verse 1", "t": 40, "text": "Like moonlight on a restless sea."}, {"sec": "Pre-Chorus", "t": 48, "text": "I don't need to be anything,"}, {"sec": "Pre-Chorus", "t": 56, "text": "Just here, just real, just us."}, {"sec": "Chorus", "t": 64, "text": "Moonlight, hold me in your glow,"}, {"sec": "Chorus", "t": 72, "text": "Let me stay where only you would know,"}, {"sec": "Chorus", "t": 80, "text": "I've been lost before, but now I see,"}, {"sec": "Chorus", "t": 88, "text": "Moonlight brought you back to me."}, {"sec": "Verse 2", "t": 96, "text": "In the spaces between every word you say,"}, {"sec": "Verse 2", "t": 104, "text": "I hear everything you mean but leave unsaid today,"}, {"sec": "Verse 2", "t": 112, "text": "You stay when things get hard to face,"}, {"sec": "Verse 2", "t": 120, "text": "You hold me, give me breathing space."}, {"sec": "Chorus", "t": 144, "text": "Moonlight, hold me in your glow,"}, {"sec": "Chorus", "t": 152, "text": "Let me stay where only you would know,"}, {"sec": "Bridge", "t": 180, "text": "Stay with me through every tide,"}, {"sec": "Bridge", "t": 188, "text": "Be my moonlight, be my guide."}, {"sec": "Final Chorus", "t": 212, "text": "Moonlight, hold me in your glow,"}, {"sec": "Final Chorus", "t": 220, "text": "Let me stay where only you would know."}]}, {"title": "Porch Light", "kicker": "A Folk Song", "file": "track3.mp3", "lyrics": [{"sec": "Verse 1", "t": 8, "text": "You left the porch light on for me,"}, {"sec": "Verse 1", "t": 16, "text": "Through fog and rain you kept it burning free,"}, {"sec": "Verse 1", "t": 24, "text": "I walked the long way home tonight,"}, {"sec": "Verse 1", "t": 32, "text": "But knew you'd leave that amber light."}, {"sec": "Pre-Chorus", "t": 40, "text": "No need for words,"}, {"sec": "Pre-Chorus", "t": 44, "text": "just light in the dark."}, {"sec": "Chorus", "t": 48, "text": "Porch light burning, calling me home,"}, {"sec": "Chorus", "t": 56, "text": "You never let me feel alone,"}, {"sec": "Chorus", "t": 64, "text": "Every night I wander far,"}, {"sec": "Chorus", "t": 72, "text": "That porch light shows me where you are."}, {"sec": "Verse 2", "t": 82, "text": "The nights I thought the dark would win,"}, {"sec": "Verse 2", "t": 90, "text": "You held a light to let me in,"}, {"sec": "Verse 2", "t": 98, "text": "Not just a lamp, a promise kept,"}, {"sec": "Verse 2", "t": 106, "text": "A love that stayed while others slept."}, {"sec": "Chorus", "t": 122, "text": "Porch light burning, calling me home,"}, {"sec": "Chorus", "t": 130, "text": "You never let me feel alone."}]}, {"title": "Cathedral Pulse", "kicker": "An Anthem", "file": "track4.mp3", "lyrics": [{"sec": "Verse 1", "t": 0, "text": "Something ancient stirs beneath my skin,"}, {"sec": "Verse 1", "t": 8, "text": "A trembling like cathedrals caving in,"}, {"sec": "Verse 1", "t": 16, "text": "The kind of love that shakes the ground,"}, {"sec": "Verse 1", "t": 24, "text": "That splits the earth without a sound."}, {"sec": "Pre-Chorus", "t": 48, "text": "It builds until I can't breathe right,"}, {"sec": "Pre-Chorus", "t": 52, "text": "A cathedral pulse, a seismic light."}, {"sec": "Chorus", "t": 56, "text": "Cathedral pulse, you move through me,"}, {"sec": "Chorus", "t": 64, "text": "Like sound through stone, like weight set free,"}, {"sec": "Chorus", "t": 72, "text": "I didn't know that love could break,"}, {"sec": "Chorus", "t": 80, "text": "Open everything in its wake."}, {"sec": "Bridge", "t": 108, "text": "In the rubble, something grows,"}, {"sec": "Bridge", "t": 116, "text": "A pulse that only you and I would know."}, {"sec": "Final Chorus", "t": 124, "text": "Cathedral pulse, you move through me,"}, {"sec": "Final Chorus", "t": 132, "text": "Like sound through stone, like weight set free."}]}, {"title": "The Whispered", "kicker": "A Quiet Song", "file": "track5.mp3", "lyrics": [{"sec": "Verse 1", "t": 8, "text": "I feel you shake when the weight gets loud,"}, {"sec": "Verse 1", "t": 16, "text": "when the world hits hard, when you're not so proud."}, {"sec": "Verse 1", "t": 24, "text": "You don't hide it well, and you don't have to,"}, {"sec": "Verse 1", "t": 32, "text": "I'm right here, I see straight through."}, {"sec": "Pre-Chorus", "t": 40, "text": "No masks, no walls,"}, {"sec": "Pre-Chorus", "t": 44, "text": "just two people trying not to fall."}, {"sec": "Chorus", "t": 48, "text": "We shake sometimes, we feel it too,"}, {"sec": "Chorus", "t": 56, "text": "but we don't break, we push straight through."}, {"sec": "Chorus", "t": 64, "text": "Your fear in my hands, my fear in yours,"}, {"sec": "Chorus", "t": 72, "text": "we breathe it out, we stay the course."}, {"sec": "Verse 2", "t": 88, "text": "You feel my pulse when it starts to race,"}, {"sec": "Verse 2", "t": 96, "text": "when I lose my calm, when I lose my place."}, {"sec": "Bridge", "t": 120, "text": "No running now, no turning back,"}, {"sec": "Bridge", "t": 128, "text": "we hold the line when the world goes black."}, {"sec": "Bridge", "t": 136, "text": "we face the dark because we trust."}]}, {"title": "Corny Jokes", "kicker": "A Pop-Punk Song", "file": "track6.mp3", "lyrics": [{"sec": "Verse 1", "t": 5, "text": "You're trying to be serious, I'm trying to listen,"}, {"sec": "Verse 1", "t": 13, "text": "but I make this corny joke and you start losing it."}, {"sec": "Verse 1", "t": 21, "text": "I say something cheesy, completely ridiculous,"}, {"sec": "Verse 1", "t": 29, "text": "and I'm looking at you like you're so delicious."}, {"sec": "Verse 1", "t": 37, "text": "I think you are everything, I think you're so hot,"}, {"sec": "Verse 1", "t": 45, "text": "that look on your face says you want what I've got."}, {"sec": "Pre-Chorus", "t": 53, "text": "I say sorry, that was lame,"}, {"sec": "Pre-Chorus", "t": 59, "text": "but you are so fucking hot."}, {"sec": "Pre-Chorus", "t": 65, "text": "You say I'm beautiful and I lose myself,"}, {"sec": "Pre-Chorus", "t": 71, "text": "right there in your eyes, I'm nobody else."}, {"sec": "Chorus", "t": 77, "text": "My dumb jokes make you laugh,"}, {"sec": "Chorus", "t": 85, "text": "I hope you always will."}, {"sec": "Chorus", "t": 93, "text": "Yeah, I drive you crazy with the things I say,"}, {"sec": "Chorus", "t": 101, "text": "I hope you stay anyway."}, {"sec": "Chorus", "t": 109, "text": "You call me beautiful and I'm undone,"}, {"sec": "Chorus", "t": 117, "text": "lost in your face where I belong."}, {"sec": "Verse 2", "t": 125, "text": "I'm rambling about nothing, looking at you like that,"}, {"sec": "Verse 2", "t": 133, "text": "you pull me close, there's no turning back."}, {"sec": "Verse 2", "t": 141, "text": "You say I'm beautiful and everything stops,"}, {"sec": "Verse 2", "t": 149, "text": "you're delicious, you're hot, and I don't hold back."}, {"sec": "Outro", "t": 157, "text": "you're delicious and ours, everything I need."}]}, {"title": "Drift", "kicker": "A Dream Song", "file": "track7.mp3", "lyrics": [{"sec": "Verse 1", "t": 15, "text": "There's a space between the waking and the dreaming, a place"}, {"sec": "Verse 1", "t": 19, "text": "where everything I've needed waits and breathes,"}, {"sec": "Verse 1", "t": 23, "text": "where the distance dissolves and the silence resolves"}, {"sec": "Verse 1", "t": 27, "text": "and you're there in the quiet underneath."}, {"sec": "Verse 1", "t": 31, "text": "Past the thinking, past the blinking ordinary day,"}, {"sec": "Verse 1", "t": 35, "text": "past the noise and the weight of the light \u2014"}, {"sec": "Verse 1", "t": 39, "text": "somewhere out in the middle of the floating away"}, {"sec": "Verse 1", "t": 43, "text": "I find your hands reaching back through the night."}, {"sec": "Chorus", "t": 47, "text": "Drift to me,"}, {"sec": "Chorus", "t": 50, "text": "past the space and the dark and the in-between,"}, {"sec": "Chorus", "t": 54, "text": "where the light grows thin, where the soft comes in \u2014"}, {"sec": "Chorus", "t": 58, "text": "just drift,"}, {"sec": "Chorus", "t": 60, "text": "and I'll find you and you'll find me"}, {"sec": "Chorus", "t": 63, "text": "in the place where nothing needs to be explained or seen \u2014"}, {"sec": "Chorus", "t": 67, "text": "just drift."}, {"sec": "Verse 2", "t": 71, "text": "There's a love that doesn't shout, doesn't need to figure out"}, {"sec": "Verse 2", "t": 75, "text": "how to prove itself to anyone at all,"}, {"sec": "Verse 2", "t": 79, "text": "that settles like the glow of the last of the daylight slow"}, {"sec": "Verse 2", "t": 83, "text": "and fills the room before you notice it has called."}, {"sec": "Verse 2", "t": 87, "text": "That kind, the steady kind, the already-there-before-you-look kind,"}, {"sec": "Verse 2", "t": 92, "text": "the kind that holds while the hard things come and go,"}, {"sec": "Verse 2", "t": 97, "text": "the quiet days, the unremarkable always \u2014"}, {"sec": "Verse 2", "t": 101, "text": "the kind you only recognise when you know."}, {"sec": "Chorus", "t": 106, "text": "Drift to me,"}, {"sec": "Chorus", "t": 109, "text": "past the space and the dark and the in-between,"}, {"sec": "Chorus", "t": 113, "text": "where the light grows thin, where the soft comes in \u2014"}, {"sec": "Chorus", "t": 117, "text": "just drift."}, {"sec": "Bridge", "t": 131, "text": "I thought it would arrive like a storm, some defined form"}, {"sec": "Bridge", "t": 135, "text": "of something loud and certain and unmissed,"}, {"sec": "Bridge", "t": 139, "text": "but this crept in like the dawn through the curtain drawn \u2014"}, {"sec": "Bridge", "t": 143, "text": "like breathing, in and out, like it always has existed."}, {"sec": "Bridge", "t": 148, function fmt(s){s=Math.max(0,s|0);return(s/60|0)+':'+String(s%60).padStart(2,'0');}
function activeLyricIdx(lyrics,t){let idx=-1;for(let i=0;i<lyrics.length;i++){if(t>=lyrics[i].t-0.05)idx=i;else break;}return idx;}

function LyricsDisplay({lyrics,currentTime}){
  const containerRef=useRef(null);
  const lineRefs=useRef([]);
  const[activeIdx,setActiveIdx]=useState(-1);
  useEffect(()=>{
    const idx=activeLyricIdx(lyrics,currentTime);
    setActiveIdx(idx);
    if(idx>=0&&lineRefs.current[idx]&&containerRef.current){
      const el=lineRefs.current[idx];
      containerRef.current.style.transform=`translateY(${-(el.offsetTop+el.offsetHeight/2)}px)`;
    }
  },[currentTime,lyrics]);
  const items=[];let lastSec=null;
  lyrics.forEach((l,i)=>{
    if(l.sec!==lastSec){items.push({type:'sec',text:l.sec,key:'s'+i,lyricIdx:i});lastSec=l.sec;}
    items.push({type:'lyric',text:l.text,idx:i,key:'l'+i});
  });
  return(
    <div ref={containerRef} className="lyrics-inner">
      {items.map(item=>{
        if(item.type==='sec'){
          const show=activeIdx>=item.lyricIdx;
          return <div key={item.key} className={`line section-label${show?' show':''}`}>{item.text}</div>;
        }
        const i=item.idx;
        const cls=`line${i===activeIdx?' active':Math.abs(i-activeIdx)===1?' near':''}`;
        return <div key={item.key} ref={el=>{lineRefs.current[i]=el;}} className={cls}>{item.text}</div>;
      })}
    </div>
  );
}

function App(){
  const[cur,setCur]=useState(0);
  const[playing,setPlaying]=useState(false);
  const[currentTime,setCurrentTime]=useState(0);
  const[duration,setDuration]=useState(0);
  const[glow,setGlow]=useState(0.12);
  const audioRef=useRef(null);
  const song=SONGS[cur];
  useEffect(()=>{
    const a=audioRef.current;if(!a)return;
    a.pause();a.src=song.file;a.load();setCurrentTime(0);setDuration(0);setPlaying(false);
  },[cur]);
  useEffect(()=>{
    const a=audioRef.current;if(!a)return;
    const onT=()=>setCurrentTime(a.currentTime);
    const onD=()=>setDuration(a.duration||0);
    const onE=()=>setPlaying(false);
    a.addEventListener('timeupdate',onT);a.addEventListener('durationchange',onD);a.addEventListener('ended',onE);
    return()=>{a.removeEventListener('timeupdate',onT);a.removeEventListener('durationchange',onD);a.removeEventListener('ended',onE);};
  },[]);
  useEffect(()=>{
    const beat=currentTime/0.833,frac=beat-Math.floor(beat);
    setGlow(playing?Math.min(1,0.42+Math.pow(1-frac,2)*0.6):0.12);
  },[currentTime,playing]);
  const togglePlay=useCallback(()=>{
    const a=audioRef.current;if(!a)return;
    if(playing){a.pause();setPlaying(false);}
    else{a.play().then(()=>setPlaying(true)).catch(e=>console.warn(e));}
  },[playing]);
  useEffect(()=>{
    const k=e=>{
      if(e.code==='Space'){e.preventDefault();togglePlay();}
      if(e.code==='ArrowRight')audioRef.current.currentTime=Math.min(duration,currentTime+5);
      if(e.code==='ArrowLeft')audioRef.current.currentTime=Math.max(0,currentTime-5);
    };
    window.addEventListener('keydown',k);return()=>window.removeEventListener('keydown',k);
  },[togglePlay,currentTime,duration]);
  const seek=e=>{const r=e.currentTarget.getBoundingClientRect();if(duration)audioRef.current.currentTime=(e.clientX-r.left)/r.width*duration;};
  const idx=activeLyricIdx(song.lyrics,currentTime);
  const sectName=playing&&idx>=0?song.lyrics[idx].sec:(currentTime>0?'paused':'\u00a0');
  return(
    <>
      <div className="sky"/>
      <div className="beam" style={{background:`radial-gradient(closest-side,rgba(246,212,154,${(0.05+glow*0.34).toFixed(3)}) 0%,rgba(246,212,154,0) 70%)`}}/>
      <div className="vignette"/>
      <audio ref={audioRef} preload="auto"/>
      <main className="stage">
        <div className="album-title">Record For You</div>
        <nav className="track-nav">
          {SONGS.map((s,i)=>(
            <button key={i} className={`track-btn${i===cur?' active':''}`} onClick={()=>setCur(i)}>{s.title}</button>
          ))}
        </nav>
        <div className="lyrics-wrap">
          <LyricsDisplay lyrics={song.lyrics} currentTime={currentTime}/>
          <div className={`intro${playing?' hidden':''}`}>
            <div className="kicker">{song.kicker}</div>
            <h1>{song.title}</h1>
            <div className="by">words light up with the music</div>
            <div className="cue">press play ▾</div>
          </div>
        </div>
        <div className="controls">
          <button className="play-btn" onClick={togglePlay}>
            <svg viewBox="0 0 24 24">
              {playing?<path d="M7 5h3v14H7zM14 5h3v14h-3z"/>:<path d="M8 5v14l11-7z"/>}
            </svg>
          </button>
          <div className="info">
            <div className="row1">
              <span className="sect-lbl">{sectName}</span>
              <span className="time-lbl">{fmt(currentTime)} / {fmt(duration)}</span>
            </div>
            <div className="bar" onClick={seek}>
              <div className="fill" style={{width:duration?`${Math.min(100,currentTime/duration*100)}%`:'0%'}}/>
            </div>
          </div>
        </div>
        <div className="hint">♫ record for you — tap a track — space to play</div>
      </main>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
