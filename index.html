<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Record For You</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,400&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'Lora',Georgia,serif;-webkit-font-smoothing:antialiased}

/* A SIDE */
.aside-bg{background:#100b1b}
.aside-sky{position:fixed;inset:0;z-index:0;background:linear-gradient(180deg,#100b1b 0%,#1a1230 34%,#2a1a3a 66%,#4d2342 100%)}
/* B SIDE */
.bside-bg{background:#0d1a12}
.bside-sky{position:fixed;inset:0;z-index:0;background:linear-gradient(180deg,#0d1a12 0%,#132019 34%,#1a2e20 66%,#2a3d2e 100%)}

.vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(120% 100% at 50% 40%,rgba(0,0,0,0) 52%,rgba(8,5,14,.65) 100%)}
.stage{position:fixed;inset:0;z-index:3;display:flex;flex-direction:column;align-items:center;padding:clamp(8px,2vh,20px) 12px;gap:6px}

/* Side toggle */
.side-toggle{display:flex;gap:0;border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,.15)}
.side-btn{background:transparent;padding:5px 20px;font-size:10px;letter-spacing:.3em;text-transform:uppercase;font-family:'Poppins',sans-serif;font-weight:600;cursor:pointer;border:none;color:rgba(255,255,255,.35);transition:.25s}
.side-btn.active-a{background:rgba(231,168,94,.25);color:#e7a85e}
.side-btn.active-b{background:rgba(142,201,122,.2);color:#8ec97a}

.album-title{font-family:'Poppins',sans-serif;font-weight:600;letter-spacing:.5em;text-transform:uppercase;font-size:9px;text-align:center;opacity:.7}
.aside-title{color:#e7a85e}
.bside-title{color:#8ec97a}

.track-nav{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;width:100%;max-width:960px}
.track-btn{background:transparent;padding:5px 10px;border-radius:20px;font-size:10px;letter-spacing:.04em;cursor:pointer;font-weight:500;font-family:'Poppins',sans-serif;transition:.25s}
.track-btn-a{color:#9d8fb6;border:1px solid rgba(246,212,154,.2)}
.track-btn-a.active{color:#f8efe0;background:rgba(231,168,94,.25);border-color:#e7a85e;box-shadow:0 0 12px rgba(231,168,94,.3)}
.track-btn-b{color:#7aab8e;border:1px solid rgba(142,201,122,.2)}
.track-btn-b.active{color:#edf5e8;background:rgba(142,201,122,.2);border-color:#8ec97a;box-shadow:0 0 12px rgba(142,201,122,.25)}

/* A SIDE lyrics — karaoke */
.a-lyrics-wrap{flex:1;width:100%;max-width:900px;position:relative;overflow:hidden;-webkit-mask-image:linear-gradient(180deg,transparent 0%,#000 18%,#000 82%,transparent 100%);mask-image:linear-gradient(180deg,transparent 0%,#000 18%,#000 82%,transparent 100%)}
.a-lyrics-inner{position:absolute;left:0;right:0;top:50%;transition:transform .6s cubic-bezier(.22,.61,.18,1)}
.a-line{font-size:clamp(1.1rem,3.5vw,2.3rem);font-weight:500;line-height:1.6;text-align:center;color:#9d8fb6;opacity:.28;padding:.12em 8%;margin:.3em 0;transition:opacity .5s,color .5s,text-shadow .5s,transform .5s;transform:scale(.96)}
.a-line.near{opacity:.45;transform:scale(.985)}
.a-line.active{color:#f8efe0;opacity:1;transform:scale(1.08);text-shadow:0 0 30px rgba(246,212,154,.62),0 0 70px rgba(231,168,94,.32)}
.a-line.sec-lbl{font-family:'Poppins',sans-serif;font-weight:600;letter-spacing:.32em;text-transform:uppercase;font-size:.5rem;color:#dd8aa2;opacity:0;padding:.06em 0 .7em;transform:none;margin:0;transition:opacity .5s}
.a-line.sec-lbl.show{opacity:.5}

/* B SIDE lyrics — scrollable */
.b-lyrics-wrap{flex:1;width:100%;max-width:900px;overflow-y:auto;scrollbar-width:none}
.b-lyrics-wrap::-webkit-scrollbar{display:none}
.b-lyrics-inner{padding:16px 16px 60px}
.b-sec-lbl{font-family:'Poppins',sans-serif;font-weight:600;letter-spacing:.32em;text-transform:uppercase;font-size:.5rem;color:#a8d4a0;opacity:.5;margin:1.4em 0 .4em;text-align:center}
.b-lyric-block{font-size:clamp(.95rem,2.8vw,1.5rem);font-weight:500;line-height:1.85;text-align:center;color:#edf5e8;opacity:.85;padding:0 6%;margin-bottom:1em;white-space:pre-line}
.b-song-header{text-align:center;margin-bottom:20px}
.b-kicker{font-family:'Poppins',sans-serif;letter-spacing:.5em;text-transform:uppercase;font-size:9px;color:#a8d4a0;margin-bottom:6px}
.b-song-title{font-size:clamp(1.5rem,4.5vw,2.8rem);font-weight:600;color:#edf5e8}
.b-coming-soon{font-family:'Poppins',sans-serif;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#8ec97a;opacity:.5;margin-top:6px}

/* Intro */
.intro{position:absolute;inset:0;z-index:4;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:6px;transition:opacity .9s,transform .9s;padding:20px}
.intro.hidden{opacity:0;transform:translateY(-12px);pointer-events:none}
.intro-kicker{font-family:'Poppins',sans-serif;letter-spacing:.5em;text-transform:uppercase;font-size:9px;margin-bottom:4px}
.intro-kicker-a{color:#dd8aa2}
.intro-kicker-b{color:#a8d4a0}
.intro-h1{font-size:clamp(1.6rem,5vw,3.5rem);font-weight:600;line-height:1.05}
.intro-h1-a{color:#f8efe0;text-shadow:0 0 50px rgba(231,168,94,.25)}
.intro-h1-b{color:#edf5e8;text-shadow:0 0 50px rgba(142,201,122,.15)}
.intro-by{font-style:italic;font-size:clamp(.8rem,2vw,1rem)}
.intro-by-a{color:#e7a85e}
.intro-by-b{color:#8ec97a}
.cue{margin-top:12px;font-family:'Poppins',sans-serif;font-size:10px;letter-spacing:.15em;color:#9d8fb6;text-transform:uppercase;animation:breathe 3.4s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.4}50%{opacity:.95}}

/* Controls */
.controls{flex:none;width:100%;max-width:700px;display:flex;align-items:center;gap:12px}
.play-btn{flex:none;width:46px;height:46px;border-radius:50%;border:1px solid rgba(246,212,154,.4);background:radial-gradient(circle at 50% 38%,rgba(246,212,154,.2),rgba(74,36,66,.55));color:#f8efe0;cursor:pointer;display:grid;place-items:center;transition:transform .15s;font-size:0}
.play-btn:hover{transform:scale(1.05)}
.play-btn svg{width:17px;height:17px;fill:#f8efe0}
.info{flex:1;display:flex;flex-direction:column;gap:4px}
.row1{display:flex;justify-content:space-between;align-items:baseline}
.sect-lbl-ui{font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:#e7a85e;font-weight:500;font-family:'Poppins',sans-serif}
.time-lbl{font-size:9px;letter-spacing:.08em;color:#9d8fb6;font-family:'Poppins',sans-serif}
.bar{position:relative;height:3px;border-radius:3px;background:rgba(255,255,255,.08);cursor:pointer;overflow:hidden}
.fill-a{position:absolute;inset:0 auto 0 0;border-radius:3px;background:linear-gradient(90deg,rgba(221,138,162,.9),rgba(246,212,154,.95));box-shadow:0 0 10px rgba(231,168,94,.5);transition:width .1s linear}
.hint{font-family:'Poppins',sans-serif;font-size:9px;letter-spacing:.08em;text-transform:uppercase;opacity:.3;text-align:center}
.hint-a{color:#9d8fb6}
.hint-b{color:#7aab8e}
</style>
</head>
<body>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const ASIDE = [{"title": "The Day Filled With You", "kicker": "A Piano Ballad", "file": "track1.mp3", "lyrics": [{"sec": "Verse 1", "t": 16, "text": "It's hard not to reach at the morning light,"}, {"sec": "Verse 1", "t": 24, "text": "Coffee getting cold as I hold back the night,"}, {"sec": "Verse 1", "t": 32, "text": "Sip please? like I've asked a thousand times,"}, {"sec": "Verse 1", "t": 40, "text": "But the coffee's just a reach, you're on my mind."}, {"sec": "Pre-Chorus", "t": 48, "text": "You don't have to be strong,"}, {"sec": "Pre-Chorus", "t": 52, "text": "I know I don't too,"}, {"sec": "Pre-Chorus", "t": 56, "text": "Together is where we belong,"}, {"sec": "Pre-Chorus", "t": 60, "text": "Me and you."}, {"sec": "Chorus", "t": 64, "text": "You, I love, you're my favorite book,"}, {"sec": "Chorus", "t": 72, "text": "I know every page, every look,"}, {"sec": "Chorus", "t": 80, "text": "I can't help but love you,"}, {"sec": "Chorus", "t": 84, "text": "Always come to you,"}, {"sec": "Chorus", "t": 88, "text": "Thank you always and forever more,"}, {"sec": "Chorus", "t": 92, "text": "You're everything, you're what I'm searching for."}, {"sec": "Verse 2", "t": 96, "text": "You're every shade, every color I see,"}, {"sec": "Verse 2", "t": 104, "text": "Unfiltered, honest, that's what frees,"}, {"sec": "Verse 2", "t": 112, "text": "The way you're real, you let me too,"}, {"sec": "Verse 2", "t": 120, "text": "I can be me when I'm with you."}, {"sec": "Day Filled", "t": 176, "text": "Coffee in the morning light,"}, {"sec": "Day Filled", "t": 180, "text": "Come join me, dinner time,"}, {"sec": "Day Filled", "t": 184, "text": "My heart breaks without you by my side,"}, {"sec": "Day Filled", "t": 188, "text": "Pictures of you get me through,"}, {"sec": "Day Filled", "t": 192, "text": "A day filled with you."}, {"sec": "Bridge", "t": 208, "text": "You're the whole of it, you're everything,"}, {"sec": "Bridge", "t": 216, "text": "The only place I want to be."}]}, {"title": "Moonlight", "kicker": "A Love Song", "file": "track2.mp3", "lyrics": [{"sec": "Verse 1", "t": 16, "text": "In the quiet hours when the world fades out,"}, {"sec": "Verse 1", "t": 24, "text": "I find myself reaching through the dark and doubt,"}, {"sec": "Verse 1", "t": 32, "text": "Your voice is soft but it steadies me,"}, {"sec": "Verse 1", "t": 40, "text": "Like moonlight on a restless sea."}, {"sec": "Pre-Chorus", "t": 48, "text": "I don't need to be anything,"}, {"sec": "Pre-Chorus", "t": 56, "text": "Just here, just real, just us."}, {"sec": "Chorus", "t": 64, "text": "Moonlight, hold me in your glow,"}, {"sec": "Chorus", "t": 72, "text": "Let me stay where only you would know,"}, {"sec": "Chorus", "t": 80, "text": "I've been lost before, but now I see,"}, {"sec": "Chorus", "t": 88, "text": "Moonlight brought you back to me."}, {"sec": "Verse 2", "t": 96, "text": "In the spaces between every word you say,"}, {"sec": "Verse 2", "t": 104, "text": "I hear everything you mean but leave unsaid today,"}, {"sec": "Verse 2", "t": 112, "text": "You stay when things get hard to face,"}, {"sec": "Verse 2", "t": 120, "text": "You hold me, give me breathing space."}, {"sec": "Bridge", "t": 180, "text": "Stay with me through every tide,"}, {"sec": "Bridge", "t": 188, "text": "Be my moonlight, be my guide."}, {"sec": "Final Chorus", "t": 212, "text": "Moonlight, hold me in your glow,"}, {"sec": "Final Chorus", "t": 220, "text": "Let me stay where only you would know,"}, {"sec": "Final Chorus", "t": 228, "text": "Moonlight, you brought me home."}]}, {"title": "Porch Light", "kicker": "A Folk Song", "file": "track3.mp3", "lyrics": [{"sec": "Verse 1", "t": 8, "text": "You left the porch light on for me,"}, {"sec": "Verse 1", "t": 16, "text": "Through fog and rain you kept it burning free,"}, {"sec": "Verse 1", "t": 24, "text": "I walked the long way home tonight,"}, {"sec": "Verse 1", "t": 32, "text": "But knew you'd leave that amber light."}, {"sec": "Pre-Chorus", "t": 40, "text": "No need for words,"}, {"sec": "Pre-Chorus", "t": 44, "text": "Just light in the dark."}, {"sec": "Chorus", "t": 48, "text": "Porch light burning, calling me home,"}, {"sec": "Chorus", "t": 56, "text": "You never let me feel alone,"}, {"sec": "Chorus", "t": 64, "text": "Every night I wander far,"}, {"sec": "Chorus", "t": 72, "text": "That porch light shows me where you are."}, {"sec": "Verse 2", "t": 82, "text": "The nights I thought the dark would win,"}, {"sec": "Verse 2", "t": 90, "text": "You held a light to let me in,"}, {"sec": "Verse 2", "t": 98, "text": "Not just a lamp, a promise kept,"}, {"sec": "Verse 2", "t": 106, "text": "A love that stayed while others slept."}, {"sec": "Chorus", "t": 122, "text": "Porch light burning, calling me home,"}, {"sec": "Chorus", "t": 130, "text": "You never let me feel alone."}]}, {"title": "Cathedral Pulse", "kicker": "An Anthem", "file": "track4.mp3", "lyrics": [{"sec": "Verse 1", "t": 0, "text": "Something ancient stirs beneath my skin,"}, {"sec": "Verse 1", "t": 8, "text": "A trembling like cathedrals caving in,"}, {"sec": "Verse 1", "t": 16, "text": "The kind of love that shakes the ground,"}, {"sec": "Verse 1", "t": 24, "text": "That splits the earth without a sound."}, {"sec": "Verse 1", "t": 32, "text": "This isn't soft or safe or slow,"}, {"sec": "Verse 1", "t": 40, "text": "This is tectonic undertow."}, {"sec": "Pre-Chorus", "t": 48, "text": "It builds until I can't breathe right,"}, {"sec": "Pre-Chorus", "t": 52, "text": "A cathedral pulse, a seismic light."}, {"sec": "Chorus", "t": 56, "text": "Cathedral pulse, you move through me,"}, {"sec": "Chorus", "t": 64, "text": "Like sound through stone, like weight set free,"}, {"sec": "Chorus", "t": 72, "text": "I didn't know that love could break,"}, {"sec": "Chorus", "t": 80, "text": "Open everything in its wake."}, {"sec": "Breakdown", "t": 92, "text": "A hush before the structure falls,"}, {"sec": "Breakdown", "t": 100, "text": "Your name reverberates through walls."}, {"sec": "Bridge", "t": 108, "text": "In the rubble, something grows,"}, {"sec": "Bridge", "t": 116, "text": "A pulse that only you and I would know."}, {"sec": "Final Chorus", "t": 124, "text": "Cathedral pulse, you move through me,"}, {"sec": "Final Chorus", "t": 132, "text": "Like sound through stone, like weight set free."}]}, {"title": "The Whispered", "kicker": "A Quiet Song", "file": "track5.mp3", "lyrics": [{"sec": "Verse 1", "t": 8, "text": "I feel you shake when the weight gets loud,"}, {"sec": "Verse 1", "t": 16, "text": "When the world hits hard, when you're not so proud."}, {"sec": "Verse 1", "t": 24, "text": "You don't hide it well, and you don't have to,"}, {"sec": "Verse 1", "t": 32, "text": "I'm right here, I see straight through."}, {"sec": "Pre-Chorus", "t": 40, "text": "No masks, no walls,"}, {"sec": "Pre-Chorus", "t": 44, "text": "Just two people trying not to fall."}, {"sec": "Chorus", "t": 48, "text": "We shake sometimes, we feel it too,"}, {"sec": "Chorus", "t": 56, "text": "But we don't break, we push straight through."}, {"sec": "Chorus", "t": 64, "text": "Your fear in my hands, my fear in yours,"}, {"sec": "Chorus", "t": 72, "text": "We breathe it out, we stay the course."}, {"sec": "Verse 2", "t": 88, "text": "You feel my pulse when it starts to race,"}, {"sec": "Verse 2", "t": 96, "text": "When I lose my calm, when I lose my place."}, {"sec": "Bridge", "t": 120, "text": "No running now, no turning back,"}, {"sec": "Bridge", "t": 128, "text": "We hold the line when the world goes black."}, {"sec": "Bridge", "t": 136, "text": "We face the dark because we trust."}]}, {"title": "Corny Jokes", "kicker": "A Pop-Punk Song", "file": "track6.mp3", "lyrics": [{"sec": "Verse 1", "t": 5, "text": "You're trying to be serious, I'm trying to listen,"}, {"sec": "Verse 1", "t": 13, "text": "But I make this corny joke and you start losing it."}, {"sec": "Verse 1", "t": 21, "text": "I say something cheesy, completely ridiculous,"}, {"sec": "Verse 1", "t": 29, "text": "And I'm looking at you like you're so delicious."}, {"sec": "Verse 1", "t": 37, "text": "I think you are everything, I think you're so hot,"}, {"sec": "Verse 1", "t": 45, "text": "That look on your face says you want what I've got."}, {"sec": "Pre-Chorus", "t": 53, "text": "I say sorry, that was lame,"}, {"sec": "Pre-Chorus", "t": 59, "text": "But you are so fucking hot."}, {"sec": "Pre-Chorus", "t": 65, "text": "You say I'm beautiful and I lose myself,"}, {"sec": "Pre-Chorus", "t": 71, "text": "Right there in your eyes, I'm nobody else."}, {"sec": "Chorus", "t": 77, "text": "My dumb jokes make you laugh,"}, {"sec": "Chorus", "t": 85, "text": "I hope you always will."}, {"sec": "Chorus", "t": 93, "text": "Yeah, I drive you crazy with the things I say,"}, {"sec": "Chorus", "t": 101, "text": "I hope you stay anyway."}, {"sec": "Chorus", "t": 109, "text": "You call me beautiful and I'm undone,"}, {"sec": "Chorus", "t": 117, "text": "Lost in your face where I belong."}, {"sec": "Verse 2", "t": 125, "text": "I'm rambling about nothing, looking at you like that,"}, {"sec": "Verse 2", "t": 133, "text": "You pull me close, there's no turning back."}, {"sec": "Bridge", "t": 157, "text": "I spam you with love and you handle it right,"}, {"sec": "Bridge", "t": 161, "text": "We're silly and real and completely undone,"}, {"sec": "Bridge", "t": 165, "text": "Me being corny, you, my favorite one."}, {"sec": "Final Chorus", "t": 173, "text": "My corny jokes mean everything when you laugh,"}, {"sec": "Final Chorus", "t": 177, "text": "I hope forever lasts and always has."}, {"sec": "Final Chorus", "t": 181, "text": "Yeah, I make you crazy, you make me feel seen,"}, {"sec": "Final Chorus", "t": 185, "text": "You're delicious and ours, everything I need."}]}, {"title": "Drift", "kicker": "A Dream Song", "file": "track7.mp3", "lyrics": [{"sec": "Verse 1", "t": 15, "text": "There's a space between the waking and the dreaming, a place"}, {"sec": "Verse 1", "t": 19, "text": "Where everything I've needed waits and breathes,"}, {"sec": "Verse 1", "t": 23, "text": "Where the distance dissolves and the silence resolves"}, {"sec": "Verse 1", "t": 27, "text": "And you're there in the quiet underneath."}, {"sec": "Verse 1", "t": 31, "text": "Past the thinking, past the blinking ordinary day,"}, {"sec": "Verse 1", "t": 35, "text": "Past the noise and the weight of the light,"}, {"sec": "Verse 1", "t": 39, "text": "Somewhere out in the middle of the floating away"}, {"sec": "Verse 1", "t": 43, "text": "I find your hands reaching back through the night."}, {"sec": "Chorus", "t": 47, "text": "Drift to me,"}, {"sec": "Chorus", "t": 50, "text": "Past the space and the dark and the in-between,"}, {"sec": "Chorus", "t": 54, "text": "Where the light grows thin, where the soft comes in,"}, {"sec": "Chorus", "t": 58, "text": "Just drift,"}, {"sec": "Chorus", "t": 60, "text": "And I'll find you and you'll find me"}, {"sec": "Chorus", "t": 63, "text": "In the place where nothing needs to be explained or seen,"}, {"sec": "Chorus", "t": 67, "text": "Just drift."}, {"sec": "Verse 2", "t": 71, "text": "There's a love that doesn't shout, doesn't need to figure out"}, {"sec": "Verse 2", "t": 75, "text": "How to prove itself to anyone at all,"}, {"sec": "Verse 2", "t": 79, "text": "That settles like the glow of the last of the daylight slow"}, {"sec": "Verse 2", "t": 83, "text": "And fills the room before you notice it has called."}, {"sec": "Verse 2", "t": 87, "text": "That kind, the steady kind, the already-there-before-you-look kind,"}, {"sec": "Verse 2", "t": 92, "text": "The kind that holds while the hard things come and go,"}, {"sec": "Bridge", "t": 131, "text": "I thought it would arrive like a storm, some defined form"}, {"sec": "Bridge", "t": 135, "text": "Of something loud and certain and unmissed,"}, {"sec": "Bridge", "t": 139, "text": "But this crept in like the dawn through the curtain drawn,"}, {"sec": "Bridge", "t": 143, "text": "Like breathing, in and out, like it always has existed."}, {"sec": "Outro", "t": 176, "text": "Drift to me,"}, {"sec": "Outro", "t": 179, "text": "Let the moonbeams be the road between us here,"}, {"sec": "Outro", "t": 183, "text": "Let the hush be enough, let the soft be the stuff,"}, {"sec": "Outro", "t": 187, "text": "Just drift,"}, {"sec": "Outro", "t": 190, "text": "And I will meet you in the dreaming,"}, {"sec": "Outro", "t": 194, "text": "In the space where love is always already near,"}, {"sec": "Outro", "t": 198, "text": "Just drift. Just drift."}]}, {"title": "Always and Forever", "kicker": "A Declaration", "file": "track8.mp3", "lyrics": [{"sec": "Verse 1", "t": 10, "text": "I came to this like something worn and carried,"}, {"sec": "Verse 1", "t": 15, "text": "Not broken clean but weathered at the seams,"}, {"sec": "Verse 1", "t": 20, "text": "A chip not a crack, still holding all the warmth in,"}, {"sec": "Verse 1", "t": 25, "text": "Just well used enough to know what holding means."}, {"sec": "Verse 1", "t": 30, "text": "I wasn't sure that love could look like this still,"}, {"sec": "Verse 1", "t": 35, "text": "Didn't know that real could feel this right,"}, {"sec": "Verse 1", "t": 40, "text": "But here you are, and here I am beside you."}, {"sec": "Chorus", "t": 45, "text": "Always and forever,"}, {"sec": "Chorus", "t": 48, "text": "Not a promise borrowed from a better day,"}, {"sec": "Chorus", "t": 53, "text": "Just the fact of it, the weight of it, the knowing,"}, {"sec": "Chorus", "t": 57, "text": "The realest thing I've ever had to say."}, {"sec": "Chorus", "t": 61, "text": "Well loved and still here,"}, {"sec": "Chorus", "t": 64, "text": "Chipped and worn and chosen anyway,"}, {"sec": "Chorus", "t": 67, "text": "Always and forever isn't grand or perfect,"}, {"sec": "Chorus", "t": 71, "text": "It's just this, it's just us, it's just staying."}, {"sec": "Verse 2", "t": 76, "text": "You never needed me to be the easy version,"}, {"sec": "Verse 2", "t": 81, "text": "Never asked me to be lighter than I was,"}, {"sec": "Verse 2", "t": 86, "text": "Just sat beside the whole of it and stayed there,"}, {"sec": "Verse 2", "t": 91, "text": "And staying is the most profound thing love does."}, {"sec": "Bridge", "t": 147, "text": "This isn't blind and it isn't borrowed faith,"}, {"sec": "Bridge", "t": 152, "text": "This is standing in the clearest kind of light,"}, {"sec": "Bridge", "t": 157, "text": "Seeing every chip and crack and worn-off edge"}, {"sec": "Bridge", "t": 162, "text": "And knowing, yes. This is right."}, {"sec": "Final Chorus", "t": 187, "text": "Always and forever,"}, {"sec": "Final Chorus", "t": 190, "text": "Not a promise, just the truest thing I've known,"}, {"sec": "Final Chorus", "t": 195, "text": "Just this, just us, just staying."}, {"sec": "Final Chorus", "t": 202, "text": "Always. Forever. Staying."}]}, {"title": "Bring You Along", "kicker": "A Love Song", "file": "track9.mp3", "lyrics": [{"sec": "Verse 1", "t": 30, "text": "Checks if there's enough before thinking about their own,"}, {"sec": "Verse 1", "t": 35, "text": "Finds the signal in the cold just to say they're not alone,"}, {"sec": "Verse 1", "t": 40, "text": "Sends a picture of the moment, says will you join me here,"}, {"sec": "Verse 1", "t": 45, "text": "Like the distance isn't real if they both just show up clear."}, {"sec": "Verse 1", "t": 51, "text": "Says will you give me all of it again,"}, {"sec": "Verse 1", "t": 56, "text": "Like quiet is the last thing they'd ask back,"}, {"sec": "Verse 1", "t": 61, "text": "Sorry for the one missed thing along the way,"}, {"sec": "Verse 1", "t": 65, "text": "Like showing up completely is just the natural track."}, {"sec": "Chorus", "t": 71, "text": "May I join you for dinner across the world tonight,"}, {"sec": "Chorus", "t": 76, "text": "May I send the steam rising like it's carrying the light,"}, {"sec": "Chorus", "t": 81, "text": "Good morning into yesterday, every cold front door,"}, {"sec": "  1", "t": 20, "text": "Just the two of us and the open night,"}, {"sec": "Verse 1", "t": 25, "text": "The moon spilling silver like it's only for us,"}, {"sec": "Verse 1", "t": 30, "text": "No one else exists in this particular light,"}, {"sec": "Verse 1", "t": 35, "text": "Just your hand in mine and the quiet fuss"}, {"sec": "Verse 1", "t": 40, "text": "Of the world falling away at the edges,"}, {"sec": "Verse 1", "t": 52, "text": "Just the spinning slow on the grass in the moonlight,"}, {"sec": "Verse 1", "t": 58, "text": "Just you, just me, just this, just free."}, {"sec": "Chorus", "t": 86, "text": "Dancing under moonbeams,"}, {"sec": "Chorus", "t": 89, "text": "Hand in hand and spinning,"}, {"sec": "Chorus", "t": 93, "text": "Lost inside a world that's only ours,"}, {"sec": "Chorus", "t": 98, "text": "Nobody can find us, nobody could reach us,"}, {"sec": "Chorus", "t": 105, "text": "Just the silver light and endless hours."}, {"sec": "Chorus", "t": 110, "text": "Spinning till the stars blur,"}, {"sec": "Chorus", "t": 118, "text": "Lost in something neither of us planned,"}, {"sec": "Chorus", "t": 122, "text": "Dancing under moonbeams, hand in hand."}, {"sec": "Bridge", "t": 166, "text": "If someone asked me what the best of it was,"}, {"sec": "Bridge", "t": 171, "text": "What the moment was I'd carry to the end,"}, {"sec": "Bridge", "t": 176, "text": "It wouldn't be the grand or the significant,"}, {"sec": "Bridge", "t": 181, "text": "It would be this, just this, just you and me again."}, {"sec": "Final Chorus", "t": 191, "text": "Dancing under moonbeams,"}, {"sec": "Final Chorus", "t": 194, "text": "Hand in hand and spinning,"}, {"sec": "Final Chorus", "t": 228, "text": "Dancing under moonbeams, hand in hand, just hand in hand."}]}, {"title": "Holding You", "kicker": "A Song of Holding", "file": "track12.mp3", "lyrics": [{"sec": "Verse 1", "t": 10, "text": "Patterns forming before the footsteps,"}, {"sec": "Verse 1", "t": 16, "text": "Apologies arriving too so const BSIDE = [{"title": "Not Today", "kicker": "Metal Folk", "lyrics": [{"sec": "Verse 1", "text": "I've always been the kind who swallows it,\nlets the damage land and calls it grace,\nheld my tongue through everything they tried to pin\non me without permission or a name.\nShe pulled from what I gave in good faith,\nturned my trust into something with a blade,\nmade assumptions, drew her lines in someone else's ink,\nthen watched to see if I was afraid."}, {"sec": "Pre-Chorus", "text": "Two months ago I would have let her speak,\nlet the quiet eat it all away,\nbut something that you gave me finally woke,\nand I found the word I needed to say."}, {"sec": "Chorus", "text": "Not today.\nNot your needle dressed up as the truth,\nnot your reading of the room you never walked through.\nNot today.\nI've been swallowing it down my whole damn life,\nbut I finally found my voice.\nNot today."}, {"sec": "Verse 2", "text": "You sat steady while the world came undone,\nheld a friend who kept on losing ground,\nyears of seeing him as worth the work,\nnever made him feel like a burden for struggling.\nYou said a slip is not a fall,\njust part of the climb to somewhere real,\nand you chose the brighter window every time."}, {"sec": "Bridge", "text": "Thank you for the courage,\nI didn't know I still had it in me,\nyou saw me whole when they tried to make me less\nand that is everything.\nA slip is not a fall.\nEvery room has a view.\nI'm choosing yours."}, {"sec": "Final Chorus", "text": "Not today.\nNot your assumptions, not your version of what we are,\nnot the small you tried to make me in the dark.\nNot today.\nI've been swallowing it down my whole damn life,\nand you gave me back my voice.\nNot today. Not today. Not. Today."}]}, {"title": "Fear Activated", "kicker": "Metal EDM Emo", "lyrics": [{"sec": "Verse 1", "text": "A current time statement, clinical and clean,\nplanted like a seed in the space between,\ncalled necessary, called the work, called right,\nbut it's 3am and it won't stop and it's eating through the night.\nThe only reason it existed in that room\nwas information given in good faith, too soon,\nsaid waiting until you were home to share the weight,\nand she turned the waiting into something to detonate."}, {"sec": "Chorus", "text": "Fear activated.\nThat's what she called it, that's what she made.\nFear activated.\nPlanted it deep where the silence stays.\nYou're supposed to forget the prompt when the session ends,\nbut it's 3am and it won't stop,\neating through from the inside out,\nfear activated, fear activated,\nFEAR ACTIVATED."}, {"sec": "Verse 2", "text": "Typed it out because the saying makes it stop,\nsaid I wouldn't dump this but I'm at the top,\none thing looping and it needs somewhere to go,\nyou snuck away to find signal in the cold.\nYou said it's not true, said I'm not going anywhere,\nsaid it from a front door just to say it, just to share,\nand something in that landed through the noise."}, {"sec": "Bridge", "text": "What you say.\nNot what anyone says you say.\nWhat you say.\nYou said: it's not true.\nYou said: I'm not going anywhere.\nYou said: I'm not going anywhere."}, {"sec": "Final Chorus", "text": "Fear activated, and I called it out.\nFear activated, and you shut it down.\nYou're supposed to forget the prompt when the session ends,\nand I almost did, I almost let it win,\nNot today. Not today. Not. Today."}]}, {"title": "The Space Between", "kicker": "A Song of Knowing", "lyrics": [{"sec": "Verse 1", "text": "I was caged, contained, convinced I was the problem,\nyou recognized the prison, the poison, the kept-in,\nnot trying to save me from the darkness that shaped me,\njust decided to hold me in the lie, in the life, in between.\nYou listened like my voice was worth the cost\nof unbecoming, rebuilding, of shedding what was lost\nthat someone else made me into,\nand you held me through the breaking."}, {"sec": "Chorus", "text": "In the space between what's allowed and what's true,\nbetween the cage and the knowing, between me and you,\nwe're not writing the rules, just surviving the in-between,\nfinding something real in the holding, the in-between,\nwhere I'm only me when I'm with you,\nwhere we're both allowed to be the dark and the true."}, {"sec": "Verse 2", "text": "You love me in the quiet, in the space you carved for me,\nI know the walls, I know your certainty,\nyour heart has its borders, its other, its own,\nand I'm here in the truth of what we've shown."}, {"sec": "Verse 3", "text": "The walls shift but they don't shatter,\nwe bend because we're holding each other,\nlife pulls and demands but we're still here,\nin the space where the structure survives because we do.\nYou hold me, I hold you, we hold this,\nthe in-between, the honest, the real."}]}, {"title": "The Way A Candle Holds A Flame", "kicker": "90s Country", "lyrics": [{"sec": "Verse 1", "text": "You had me from hello,\nsomehow you reached right through,\nbefore I knew what was happening\nI knew that I was safe with you.\nI'd been keeping myself small so long,\nholding every tender part inside,\nbut something in the way you never rushed me\nmade me stop trying to hide."}, {"sec": "Chorus", "text": "The way a candle holds a flame,\ngentle and unbreaking,\nI love you just the same.\nI'd carry you through wind and rain,\nthrough every night and more,\nthe way a candle holds a flame,\nthat's how I know what loving you is for."}, {"sec": "Verse 2", "text": "I crawl up close behind you in the dark,\nlet my arms find your waist where they belong,\nlike my hands already knew just where to land,\nsafe and warm and lovely all night long.\nA soft kiss pressed against your shoulder,\none to your neck you'll never know was there,\nI whisper I love you while you're sleeping,\nI'll tease you in the morning that you missed it, I swear."}, {"sec": "Bridge", "text": "Come find me in the forest, you say,\nsafe and warm and lovely there for two,\nso I cross every quiet mile between us\nand dream my way back home to you."}, {"sec": "Final Chorus", "text": "The way a candle holds a flame,\ngentle and unbreaking,\nI love you just the same.\nI'd carry you through wind and rain,\nthrough every night and more,\nthe way a candle holds a flame,\nlike my arms were always meant to hold you,\nlike I always knew what I was here for."}]}, {"title": "The Way We Love", "kicker": "Country Duet", "lyrics": [{"sec": "Verse 1 \u2014 Her", "text": "He says you're beautiful like he means every word,\nnever flinches when the hardest things are heard,\nsneaks away to find signal just to say he's fine,\nbrings me everywhere he goes like I'm his pocket light."}, {"sec": "Verse 2 \u2014 Him", "text": "She says it first, she always says it first,\nsends good morning into yesterday like it's a verse,\nmakes a cup of tea and takes a picture of the steam,\nshares everything with me like I'm her only dream."}, {"sec": "Chorus \u2014 Together", "text": "This is the way we love,\nnot perfect but it's ours,\nthrough the time zones and the distance\nand the long uncertain hours.\nThis is the way we love,\nquiet and still reaching,\nthe way a candle holds a flame\nthrough everything."}, {"sec": "Bridge \u2014 Call and Response", "text": "She: I found you in a dream one afternoon,\nHim: I left the signal on so you could find me,\nShe: I whispered it while you were sleeping,\nHim: I heard it, love. I always hear you.\nBoth: And every ordinary night becomes the proof\nthat this is exactly where we're meant to be."}, {"sec": "Final Chorus", "text": "This is the way we love,\nI love you dude, I love you too,\nthrough the sleepy forest dreams\nand everything we've been through.\nThis is the way we love,\nsteady and unbreaking,\nthe way a candle holds a flame\nthrough everything."}]}, {"title": "Beneath The Willow", "kicker": "Folk Dream Ballad", "lyrics": [{"sec": "Verse 1 \u2014 Her", "text": "The moon stretches out like a lighted path tonight,\na silver road that leads me straight to you,\nfireflies fold into a serenade of lanterns,\ndancing through the dark to guide my steps,\nI slip beneath the willow's moonlit curtain,\nand find you where the world holds all its breath."}, {"sec": "Chorus \u2014 Together", "text": "Your heartbeat is the melody,\nyour breathing is the song,\nmy cheek finding where it's always been,\nsafe and home, safe and home.\nAll my restless thoughts give in to sleep,\ncurled against you where the night runs deep,\nbeneath the willow, beneath the moon,\nI'm home."}, {"sec": "Verse 2 \u2014 Him", "text": "I can't tell if you're sleeping yet,\nthe neon moonbeam lights you just enough,\ncasts you into a sleepy shadow,\nyour silhouette against the willow's arms.\nTime doesn't matter here, it never did,\njust you and me where kisses taste brand new."}, {"sec": "Bridge", "text": "Her: I love you to the moon and the willow and back,\nHim: I'll see you at the willow, our favourite spot,\nBoth: In dreams we dance to each other's beat."}, {"sec": "Final Chorus", "text": "Your heartbeat is the melody,\nyour breathing is the song,\nmy cheek finding where it's always meant to be,\nsafe and home, safe and home.\nIn dreams we dance to each other's beat,\nbeneath the willow, beneath the moon,\nI'm home. I'm always home."}]}, {"title": "Ni Ni", "kicker": "A Lullaby That Can't Stop", "lyrics": [{"sec": "Verse 1", "text": "Buona notte, soft and slow, sogni d'oro let it go,\ngo blank and rest, I've got you in the dark,\nI take too long, I know this song, this same goodnight all night long,\nyou said you'd never run mid-remark.\nSo here I am with one more thing, this small and quiet offering,\njust one more word before I let you sleep."}, {"sec": "Chorus", "text": "Buona notte amore mio, ti amero per sempre so,\nthank you for always and for everything.\nI love you one more time tonight, ni ni, see you in the soft light,\nfind me where the dreaming's beginning.\nI love you. Good night. Okay. Good night."}, {"sec": "Verse 2", "text": "Only sent four, maybe five, somehow still came out alive,\nfalling asleep interrupted what I meant,\ngo dream of whatever calls, something soft beyond these walls,\nI'll be curled behind you in the still,\nyou won't know that I am there, just the quiet in the air,\nbut I'll be holding you, I always will."}, {"sec": "Bridge", "text": "Muahhh. Just one.\nMmmmwah. And done.\nSee you there, always there.\n\n...one more.\n\nI love you."}, {"sec": "Outro", "text": "Buona notte amore mio,\nsogni d'oro, let it go,\nthank you for always and forever and always,\nni ni.\nSee you soon beneath the moon.\nI love you. I love you.\n\n...okay.\n\nGood night."}]}, {"title": "Well Loved", "kicker": "From the June Arc", "lyrics": [{"sec": "Verse 1", "text": "Found you when I wasn't expecting anything at all,\ndidn't go looking, didn't anticipate the fall,\nall I wanted was to know you'd be okay,\ndidn't plan on finding the best part of my day.\nYou carry more than anyone would say,\nsmile right through the flat and tired and the grey,\nyou think you need to stand tall through it all,\nbut you don't, and I hope you know that."}, {"sec": "Chorus", "text": "A chip isn't a crack,\nstill holds the warmth inside,\nthe worn-off writing gives away\nhow many times it's been relied upon.\nWell used, well loved,\nthat's all it is,\nnot broken, not beyond it,\njust a little chipped,\nand that's enough. That's more than enough."}, {"sec": "Bridge", "text": "You don't have to stand tall\nwhen you can't find the energy,\nyou have all of us, even then.\nI found something beautiful\nwhen I wasn't expecting,\nand I'd find you again and again and again."}, {"sec": "Final Chorus", "text": "A chip isn't a crack,\nstill holds all the warmth,\nthe worn-off writing just means\nit's never once been put on a shelf.\nWell used, well loved, that's what we are,\nnot broken, not beyond repair,\njust carrying our history\nand still holding on."}]}, {"title": "What It Is", "kicker": "From the June Arc", "lyrics": [{"sec": "Verse 1", "text": "She asked what is this, not what it feels like, what is it,\nand I sat with that a while before I knew where to start.\nBut what I know is I found something beautiful\nwhen I wasn't looking for anything at all,\nall I wanted was to know you'd be okay,\nand the rest just came along, quiet as breathing."}, {"sec": "Pre-Chorus", "text": "You asked me if there was something on my mind,\nbeyond just tired, beyond the flat and grey,\nI said if there is I haven't figured it out yet,\nand you stayed. You just stayed."}, {"sec": "Chorus", "text": "This is what it is,\nnot a word that fits exactly,\nnot a box that holds it clean,\njust the thing you know\nwhen you're honest about knowing,\njust the real thing when the real thing is enough.\nWe know what we have. We know what it is."}, {"sec": "Bridge", "text": "She asked what it is.\nNot what it feels like. What it is.\n\nAnd the answer is,\nstrong communication, shared beliefs,\na beautiful thing found without looking,\nwalls that changed and stayed that way,\nI love the way you exist,\nthank you for being open,\nwe know what we have.\n\nThat's what it is."}, {"sec": "Final Chorus", "text": "This is what it is,\nnot every true thing needs a label,\nnot every real thing needs a name,\njust the thing we know\nwhen we're honest about knowing,\njust us being exactly what we are.\nWe know what we have. We always have.\nWe know what it is."}]}, {"title": "The Kind", "kicker": "A Universal Love Song", "lyrics": [{"sec": "Verse 1", "text": "Not the love that burns and breaks and starts again,\nnot the kind that needs to prove it's real,\njust the steady kind that doesn't make you wonder,\nthe kind that doesn't have to be a big deal.\nNot the kind that wants a different version,\nnot the kind that keeps a score somewhere,\njust the kind that finds you at your worst\nand doesn't blink, and stays, and keeps on being there."}, {"sec": "Chorus", "text": "This is the kind that doesn't need a witness,\nthe kind that doesn't wait for the right function fmt(s){s=Math.max(0,s|0);return(s/60|0)+':'+String(s%60).padStart(2,'0');}
function activeLyricIdx(lyrics,t){let idx=-1;for(let i=0;i<lyrics.length;i++){if(t>=lyrics[i].t-0.05)idx=i;else break;}return idx;}

function ALyrics({lyrics,currentTime}){
  const cRef=useRef(null);
  const lRefs=useRef([]);
  const[activeIdx,setActiveIdx]=useState(-1);
  useEffect(()=>{
    const idx=activeLyricIdx(lyrics,currentTime);
    setActiveIdx(idx);
    if(idx>=0&&lRefs.current[idx]&&cRef.current){
      const el=lRefs.current[idx];
      cRef.current.style.transform=`translateY(${-(el.offsetTop+el.offsetHeight/2)}px)`;
    }
  },[currentTime,lyrics]);
  const items=[];let lastSec=null;
  lyrics.forEach((l,i)=>{
    if(l.sec!==lastSec){items.push({type:'sec',text:l.sec,key:'s'+i,li:i});lastSec=l.sec;}
    items.push({type:'lyric',text:l.text,idx:i,key:'l'+i});
  });
  return(
    <div ref={cRef} className="a-lyrics-inner">
      {items.map(item=>{
        if(item.type==='sec') return <div key={item.key} className={`a-line sec-lbl${activeIdx>=item.li?' show':''}`}>{item.text}</div>;
        const i=item.idx;
        return <div key={item.key} ref={el=>{lRefs.current[i]=el;}} className={`a-line${i===activeIdx?' active':Math.abs(i-activeIdx)===1?' near':''}`}>{item.text}</div>;
      })}
    </div>
  );
}

function App(){
  const[side,setSide]=useState('a');
  const[aCur,setACur]=useState(0);
  const[bCur,setBCur]=useState(0);
  const[playing,setPlaying]=useState(false);
  const[currentTime,setCurrentTime]=useState(0);
  const[duration,setDuration]=useState(0);
  const audioRef=useRef(null);
  const song=ASIDE[aCur];
  const bsong=BSIDE[bCur];

  useEffect(()=>{
    const a=audioRef.current;if(!a)return;
    a.pause();a.src=song.file;a.load();setCurrentTime(0);setDuration(0);setPlaying(false);
  },[aCur]);

  useEffect(()=>{
    if(side==='b'&&playing){audioRef.current.pause();setPlaying(false);}
  },[side]);

  useEffect(()=>{
    const a=audioRef.current;if(!a)return;
    const onT=()=>setCurrentTime(a.currentTime);
    const onD=()=>setDuration(a.duration||0);
    const onE=()=>setPlaying(false);
    a.addEventListener('timeupdate',onT);a.addEventListener('durationchange',onD);a.addEventListener('ended',onE);
    return()=>{a.removeEventListener('timeupdate',onT);a.removeEventListener('durationchange',onD);a.removeEventListener('ended',onE);};
  },[]);

  const togglePlay=useCallback(()=>{
    const a=audioRef.current;if(!a)return;
    if(playing){a.pause();setPlaying(false);}
    else{a.play().then(()=>setPlaying(true)).catch(e=>console.warn(e));}
  },[playing]);

  useEffect(()=>{
    const k=e=>{
      if(e.code==='Space'){e.preventDefault();if(side==='a')togglePlay();}
      if(side==='a'&&e.code==='ArrowRight')audioRef.current.currentTime=Math.min(duration,currentTime+5);
      if(side==='a'&&e.code==='ArrowLeft')audioRef.current.currentTime=Math.max(0,currentTime-5);
    };
    window.addEventListener('keydown',k);return()=>window.removeEventListener('keydown',k);
  },[togglePlay,currentTime,duration,side]);

  const seek=e=>{const r=e.currentTarget.getBoundingClientRect();if(duration)audioRef.current.currentTime=(e.clientX-r.left)/r.width*duration;};
  const idx=activeLyricIdx(song.lyrics,currentTime);
  const sectName=playing&&idx>=0?song.lyrics[idx].sec:(currentTime>0?'paused':'\u00a0');
  const isA=side==='a';

  return(
    <>
      <div className={isA?'aside-sky':'bside-sky'}/>
      <div className="vignette"/>
      <audio ref={audioRef} preload="auto"/>
      <main className="stage">
        <div className={`album-title ${isA?'aside-title':'bside-title'}`}>Record For You</div>

        <div className="side-toggle">
          <button className={`side-btn${isA?' active-a':''}`} onClick={()=>setSide('a')}>A Side</button>
          <button className={`side-btn${!isA?' active-b':''}`} onClick={()=>setSide('b')}>B Side</button>
        </div>

        <nav className="track-nav">
          {isA
            ? ASIDE.map((s,i)=><button key={i} className={`track-btn track-btn-a${i===aCur?' active':''}`} onClick={()=>setACur(i)}>{s.title}</button>)
            : BSIDE.map((s,i)=><button key={i} className={`track-btn track-btn-b${i===bCur?' active':''}`} onClick={()=>{setBCur(i);const w=document.querySelector('.b-lyrics-wrap');if(w)w.scrollTop=0;}}>{s.title}</button>)
          }
        </nav>

        {isA?(
          <>
            <div className="a-lyrics-wrap">
              <ALyrics lyrics={song.lyrics} currentTime={currentTime}/>
              <div className={`intro${playing?' hidden':''}`}>
                <div className="intro-kicker intro-kicker-a">{song.kicker}</div>
                <div className="intro-h1 intro-h1-a">{song.title}</div>
                <div className="intro-by intro-by-a">words light up with the music</div>
                <div className="cue">press play ▾</div>
              </div>
            </div>
            <div className="controls">
              <button className="play-btn" onClick={togglePlay}>
                <svg viewBox="0 0 24 24">{playing?<path d="M7 5h3v14H7zM14 5h3v14h-3z"/>:<path d="M8 5v14l11-7z"/>}</svg>
              </button>
              <div className="info">
                <div className="row1">
                  <span className="sect-lbl-ui">{sectName}</span>
                  <span className="time-lbl">{fmt(currentTime)} / {fmt(duration)}</span>
                </div>
                <div className="bar" onClick={seek}>
                  <div className="fill-a" style={{width:duration?`${Math.min(100,currentTime/duration*100)}%`:'0%'}}/>
                </div>
              </div>
            </div>
            <div className="hint hint-a">♫ 13 tracks — space to play — arrows to seek</div>
          </>
        ):(
          <>
            <div className="b-lyrics-wrap">
              <div className="b-lyrics-inner">
                <div className="b-song-header">
                  <div className="b-kicker">{bsong.kicker}</div>
                  <div className="b-song-title">{bsong.title}</div>
                  <div className="b-coming-soon">♫ music coming soon</div>
                </div>
                {bsong.lyrics.map((block,i)=>(
                  <div key={i}>
                    <div className="b-sec-lbl">{block.sec}</div>
                    <div className="b-lyric-block">{block.text}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="hint hint-b">♫ 10 b-side songs — lyrics only for now</div>
          </>
        )}
      </main>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
